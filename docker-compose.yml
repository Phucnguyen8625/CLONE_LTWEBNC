version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manga_store_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=ban_truyen_tranh
      - DB_USER=root
      - DB_PASS=123456
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: manga_store_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=ban_truyen_tranh
      - MYSQL_ROOT_PASSWORD=123456
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
